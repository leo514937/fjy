services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: data-infra-gateway
    restart: unless-stopped
    environment:
      GATEWAY_ADDR: :8080
      GATEWAY_XIAOGUGIT_URL: ${GATEWAY_XIAOGUGIT_URL:-http://host.docker.internal:8000}
      GATEWAY_PROBABILITY_URL: ${GATEWAY_PROBABILITY_URL:-http://host.docker.internal:5000}
      GATEWAY_SERVICE_API_KEY: ${GATEWAY_SERVICE_API_KEY:-change-me}
      GATEWAY_XG_AUTH_SECRET: ${GATEWAY_XG_AUTH_SECRET:-}
      GATEWAY_XG_AUTH_USERNAME: ${GATEWAY_XG_AUTH_USERNAME:-mogong}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

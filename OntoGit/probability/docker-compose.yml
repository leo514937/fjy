services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: probability-backend
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      UVICORN_RELOAD: "false"
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: probability-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped

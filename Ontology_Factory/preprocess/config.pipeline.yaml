pipeline:
  conservative: true
  output: clean_text

io:
  input_globs:
    - "*.txt"
    - "*.md"
    - "*.pdf"
    - "*.docx"
    - "*.html"
    - "*.htm"
  output_dir: "outputs"
  encoding_fallbacks: ["utf-8", "utf-8-sig", "gb18030"]

models:
  enabled: false
  candidates: []
  arbitration:
    max_relative_change: 0.08
    require_numbers_preserved: true
    require_two_models_agree: false
  chunking:
    enabled: true
    max_chars: 3500

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      ONTOLOGY_AUDIT_QDRANT_MODE: ${ONTOLOGY_AUDIT_QDRANT_MODE:-server}
      ONTOLOGY_AUDIT_QDRANT_URL: ${ONTOLOGY_AUDIT_QDRANT_URL:-http://qdrant:6333}
      ONTOLOGY_AUDIT_NEO4J_ENABLED: ${ONTOLOGY_AUDIT_NEO4J_ENABLED:-true}
      ONTOLOGY_AUDIT_NEO4J_URI: ${ONTOLOGY_AUDIT_NEO4J_URI:-bolt://neo4j:7687}
      ONTOLOGY_AUDIT_NEO4J_USERNAME: ${ONTOLOGY_AUDIT_NEO4J_USERNAME:-neo4j}
      ONTOLOGY_AUDIT_NEO4J_PASSWORD: ${ONTOLOGY_AUDIT_NEO4J_PASSWORD:-password}
      ONTOLOGY_AUDIT_NEO4J_DATABASE: ${ONTOLOGY_AUDIT_NEO4J_DATABASE:-neo4j}
      ONTOLOGY_AUDIT_RUN_ROOT: ${ONTOLOGY_AUDIT_RUN_ROOT:-/app/artifacts/runs}
      ONTOLOGY_AUDIT_CHECKPOINT_PATH: ${ONTOLOGY_AUDIT_CHECKPOINT_PATH:-/app/artifacts/checkpoints/audit_sessions.sqlite3}
      ONTOLOGY_AUDIT_BACKEND_TIMEOUT_SECONDS: ${ONTOLOGY_AUDIT_BACKEND_TIMEOUT_SECONDS:-5.0}
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      - qdrant
      - neo4j

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${ONTOLOGY_AUDIT_NEO4J_USERNAME:-neo4j}/${ONTOLOGY_AUDIT_NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data

volumes:
  qdrant_storage:
  neo4j_data:
